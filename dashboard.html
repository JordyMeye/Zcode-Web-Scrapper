<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Z Code Predictions Dashboard</title>
  <style>
    :root {
      --bg: #0f1117;
      --sidebar: #161b27;
      --card: #1c2333;
      --border: #2a3248;
      --accent: #22c55e;
      --accent2: #3b82f6;
      --warn: #f59e0b;
      --danger: #ef4444;
      --text: #e2e8f0;
      --muted: #8892a4;
      --radius: 10px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      min-height: 100vh;
    }

    /* ── SIDEBAR ── */
    #sidebar {
      width: 280px;
      min-width: 280px;
      background: var(--sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 20px 16px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }

    #sidebar h1 {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    #sidebar .subtitle {
      font-size: 0.72rem;
      color: var(--muted);
      margin-bottom: 20px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 24px;
    }

    .stat-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 12px;
    }

    .stat-box .val {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--accent);
    }

    .stat-box .lbl {
      font-size: 0.68rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .section-title {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      margin-bottom: 8px;
      margin-top: 16px;
    }

    /* confidence slider */
    #conf-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }

    #conf-slider {
      flex: 1;
      accent-color: var(--accent);
    }

    #conf-label {
      font-size: 0.78rem;
      color: var(--accent);
      font-weight: 600;
      min-width: 36px;
      text-align: right;
    }

    /* search */
    #search {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px 10px;
      color: var(--text);
      font-size: 0.82rem;
      outline: none;
      margin-bottom: 16px;
    }

    #search:focus { border-color: var(--accent2); }

    /* league list */
    #league-list {
      list-style: none;
      flex: 1;
      overflow-y: auto;
    }

    #league-list li {
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 0.78rem;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--muted);
      transition: background 0.15s, color 0.15s;
    }

    #league-list li:hover,
    #league-list li.active {
      background: rgba(34,197,94,.12);
      color: var(--text);
    }

    #league-list li .badge {
      background: var(--border);
      border-radius: 20px;
      padding: 1px 7px;
      font-size: 0.65rem;
      color: var(--muted);
    }

    #league-list li.active .badge {
      background: var(--accent);
      color: #000;
    }

    .scrape-time {
      font-size: 0.65rem;
      color: var(--muted);
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    /* ── MAIN ── */
    #main {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
    }

    #main-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    #main-header h2 {
      font-size: 1.2rem;
      font-weight: 700;
    }

    #count-label {
      font-size: 0.8rem;
      color: var(--muted);
    }

    /* sport tabs */
    #sport-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .sport-tab {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 0.78rem;
      cursor: pointer;
      color: var(--muted);
      transition: all 0.15s;
    }

    .sport-tab:hover, .sport-tab.active {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
      font-weight: 600;
    }

    /* cards grid */
    #cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
      gap: 16px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: border-color 0.2s, transform 0.15s;
    }

    .card:hover {
      border-color: var(--accent2);
      transform: translateY(-2px);
    }

    /* card top row */
    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .league-badge {
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--accent2);
      background: rgba(59,130,246,.12);
      padding: 3px 8px;
      border-radius: 4px;
      max-width: 180px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .conf-badge {
      font-size: 0.72rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
      white-space: nowrap;
    }

    .conf-high   { background: rgba(34,197,94,.15);  color: var(--accent); }
    .conf-mid    { background: rgba(245,158,11,.15); color: var(--warn);   }
    .conf-low    { background: rgba(59,130,246,.15); color: var(--accent2);}

    /* match title */
    .match-title {
      text-align: center;
    }

    .match-title .teams {
      font-size: 1rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .match-title .vs {
      font-size: 0.7rem;
      color: var(--muted);
      font-weight: 400;
    }

    .match-title .datetime {
      font-size: 0.68rem;
      color: var(--muted);
      margin-top: 3px;
    }

    /* score block */
    .scores {
      display: flex;
      gap: 10px;
    }

    .score-box {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px;
      text-align: center;
    }

    .score-box .lbl {
      font-size: 0.6rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .score-box .val {
      font-size: 1.1rem;
      font-weight: 700;
      margin-top: 2px;
    }

    /* confidence bar */
    .conf-bar-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .conf-bar-track {
      flex: 1;
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }

    .conf-bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.4s ease;
    }

    .conf-bar-lbl {
      font-size: 0.7rem;
      color: var(--muted);
      min-width: 60px;
      text-align: right;
    }

    /* probability row */
    .prob-row {
      display: flex;
      gap: 4px;
    }

    .prob-col {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 8px;
      text-align: center;
    }

    .prob-col .p-lbl {
      font-size: 0.58rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .prob-col .p-val {
      font-size: 0.88rem;
      font-weight: 700;
      margin-top: 2px;
    }

    .prob-col.best {
      border-color: var(--accent);
      background: rgba(34,197,94,.06);
    }

    .prob-col.best .p-val { color: var(--accent); }

    /* no results */
    #no-results {
      display: none;
      text-align: center;
      color: var(--muted);
      margin-top: 60px;
      font-size: 0.9rem;
    }

    /* loading */
    #loading {
      text-align: center;
      color: var(--muted);
      margin-top: 80px;
      font-size: 0.9rem;
    }

    /* scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<!-- LEFT SIDEBAR -->
<aside id="sidebar">
  <h1>Z Code Predictor</h1>
  <p class="subtitle">Sports Predictions Dashboard</p>

  <div class="stats-grid">
    <div class="stat-box">
      <div class="val" id="stat-total">–</div>
      <div class="lbl">Predictions</div>
    </div>
    <div class="stat-box">
      <div class="val" id="stat-leagues">–</div>
      <div class="lbl">Leagues</div>
    </div>
    <div class="stat-box">
      <div class="val" id="stat-avg">–</div>
      <div class="lbl">Avg Conf.</div>
    </div>
    <div class="stat-box">
      <div class="val" id="stat-high">–</div>
      <div class="lbl">High (80%+)</div>
    </div>
  </div>

  <div class="section-title">Search teams</div>
  <input id="search" type="text" placeholder="e.g. Arsenal, Real Madrid…" autocomplete="off" />

  <div class="section-title">Min confidence</div>
  <div id="conf-wrap">
    <input id="conf-slider" type="range" min="60" max="100" value="60" />
    <span id="conf-label">60%</span>
  </div>

  <div class="section-title">Leagues</div>
  <ul id="league-list"></ul>

  <p class="scrape-time" id="scrape-time"></p>
</aside>

<!-- MAIN PANEL -->
<main id="main">
  <div id="main-header">
    <h2>Predictions</h2>
    <span id="count-label"></span>
  </div>

  <div id="sport-tabs"></div>

  <div id="loading">Loading predictions…</div>
  <div id="cards"></div>
  <div id="no-results">No predictions match your filters.</div>
</main>

<script>
  let allPredictions = [];
  let activeSport = 'All';
  let activeLeague = 'All';
  let minConf = 60;
  let searchQuery = '';

  // ── Load data ──────────────────────────────────────────────────────────────
  async function loadData() {
    let data;

    // Try predictions_by_sport first (full dataset), fallback to high_value_predictions
    try {
      const res = await fetch('./high_confidence_predictions.json');
      data = await res.json();
    } catch (e) {
      document.getElementById('loading').textContent = 'Error loading predictions. Serve via HTTP server.';
      return;
    }

    // Collect all predictions from both possible structures
    let preds = [];

    if (data.predictions_by_sport) {
      Object.values(data.predictions_by_sport).forEach(sportPreds => {
        preds = preds.concat(sportPreds);
      });
    }

    if (data.high_value_predictions && data.high_value_predictions.length) {
      // Merge, deduplicating by team1+team2+date_time
      const seen = new Set(preds.map(p => key(p)));
      data.high_value_predictions.forEach(p => {
        if (!seen.has(key(p))) {
          seen.add(key(p));
          preds.push(p);
        }
      });
    }

    allPredictions = preds;

    // Populate scrape time
    if (data.scrape_time) {
      const d = new Date(data.scrape_time);
      document.getElementById('scrape-time').textContent =
        'Updated: ' + d.toLocaleString();
    }

    buildUI();
  }

  function key(p) {
    return (p.team1 || '') + '|' + (p.team2 || '') + '|' + (p.date_time || '') + '|' + (p.league || '');
  }

  // ── Build sidebar & render ─────────────────────────────────────────────────
  function buildUI() {
    document.getElementById('loading').style.display = 'none';

    // Unique sports
    const sports = ['All', ...new Set(allPredictions.map(p => p.sport || 'Football').filter(Boolean))];
    const tabsEl = document.getElementById('sport-tabs');
    tabsEl.innerHTML = '';
    sports.forEach(s => {
      const btn = document.createElement('button');
      btn.className = 'sport-tab' + (s === activeSport ? ' active' : '');
      btn.textContent = s;
      btn.onclick = () => { activeSport = s; activeLeague = 'All'; buildUI(); };
      tabsEl.appendChild(btn);
    });

    // Filtered by sport for league list
    const sportFiltered = allPredictions.filter(p =>
      activeSport === 'All' || (p.sport || 'Football') === activeSport
    );

    // Unique leagues
    const leagueCounts = {};
    sportFiltered.forEach(p => {
      const lg = p.league || 'Unknown';
      leagueCounts[lg] = (leagueCounts[lg] || 0) + 1;
    });

    const leagueListEl = document.getElementById('league-list');
    leagueListEl.innerHTML = '';

    const allLi = document.createElement('li');
    allLi.className = activeLeague === 'All' ? 'active' : '';
    allLi.innerHTML = '<span>All Leagues</span><span class="badge">' + sportFiltered.length + '</span>';
    allLi.onclick = () => { activeLeague = 'All'; render(); buildLeagueList(leagueCounts); };
    leagueListEl.appendChild(allLi);

    Object.entries(leagueCounts)
      .sort((a, b) => b[1] - a[1])
      .forEach(([lg, cnt]) => {
        const li = document.createElement('li');
        li.className = activeLeague === lg ? 'active' : '';
        li.innerHTML = '<span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:180px">' + escHtml(lg) + '</span><span class="badge">' + cnt + '</span>';
        li.onclick = () => { activeLeague = lg; render(); buildLeagueList(leagueCounts); };
        leagueListEl.appendChild(li);
      });

    render();
  }

  function buildLeagueList(leagueCounts) {
    // Just refresh active states
    const items = document.querySelectorAll('#league-list li');
    items.forEach((li, i) => {
      if (i === 0) li.className = activeLeague === 'All' ? 'active' : '';
      // others handled by onclick
    });
  }

  function render() {
    const filtered = allPredictions.filter(p => {
      const sport = p.sport || 'Football';
      const league = p.league || 'Unknown';
      const conf = p.confidence_value || 0;
      const teamText = ((p.team1 || '') + ' ' + (p.team2 || '')).toLowerCase();

      return (activeSport === 'All' || sport === activeSport) &&
             (activeLeague === 'All' || league === activeLeague) &&
             conf >= minConf &&
             (searchQuery === '' || teamText.includes(searchQuery.toLowerCase()));
    });

    // Sort by confidence desc
    filtered.sort((a, b) => (b.confidence_value || 0) - (a.confidence_value || 0));

    // Stats
    const total = allPredictions.length;
    const leagues = new Set(allPredictions.map(p => p.league || 'Unknown')).size;
    const avg = allPredictions.length
      ? (allPredictions.reduce((s, p) => s + (p.confidence_value || 0), 0) / allPredictions.length).toFixed(1) + '%'
      : '–';
    const high = allPredictions.filter(p => (p.confidence_value || 0) >= 80).length;

    document.getElementById('stat-total').textContent = total;
    document.getElementById('stat-leagues').textContent = leagues;
    document.getElementById('stat-avg').textContent = avg;
    document.getElementById('stat-high').textContent = high;
    document.getElementById('count-label').textContent = filtered.length + ' shown';

    const cardsEl = document.getElementById('cards');
    const noEl = document.getElementById('no-results');

    if (filtered.length === 0) {
      cardsEl.innerHTML = '';
      noEl.style.display = 'block';
      return;
    }

    noEl.style.display = 'none';
    cardsEl.innerHTML = '';

    filtered.forEach(p => {
      cardsEl.appendChild(buildCard(p));
    });
  }

  function buildCard(p) {
    const conf = p.confidence_value || 0;
    const confClass = conf >= 80 ? 'conf-high' : conf >= 70 ? 'conf-mid' : 'conf-low';
    const barColor = conf >= 80 ? 'var(--accent)' : conf >= 70 ? 'var(--warn)' : 'var(--accent2)';

    const t1 = parseFloat((p.prob_team1_win || '0').replace('%', '')) || 0;
    const dr = parseFloat((p.prob_draw || '0').replace('%', ''))      || 0;
    const t2 = parseFloat((p.prob_team2_win || '0').replace('%', '')) || 0;
    const bestIdx = [t1, dr, t2].indexOf(Math.max(t1, dr, t2));

    const probLabels = [escHtml(p.team1 || 'Team 1'), 'Draw', escHtml(p.team2 || 'Team 2')];
    const probVals   = [t1.toFixed(1) + '%', dr.toFixed(1) + '%', t2.toFixed(1) + '%'];

    const league = p.league || p.sport || 'Unknown';
    const datetime = p.date_time || '';

    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-top">
        <span class="league-badge" title="${escHtml(league)}">${escHtml(league)}</span>
        <span class="conf-badge ${confClass}">${escHtml(p.confidence || conf + '%')}</span>
      </div>

      <div class="match-title">
        <div class="teams">
          <span>${escHtml(p.team1 || '?')}</span>
          <span class="vs">vs</span>
          <span>${escHtml(p.team2 || '?')}</span>
        </div>
        ${datetime ? `<div class="datetime">${escHtml(datetime)}</div>` : ''}
      </div>

      <div class="scores">
        <div class="score-box">
          <div class="lbl">1st Half</div>
          <div class="val">${escHtml(p.score_first_half || '–')}</div>
        </div>
        <div class="score-box">
          <div class="lbl">Full Time</div>
          <div class="val">${escHtml(p.score_final || '–')}</div>
        </div>
      </div>

      <div class="conf-bar-wrap">
        <div class="conf-bar-track">
          <div class="conf-bar-fill" style="width:${conf}%;background:${barColor}"></div>
        </div>
        <span class="conf-bar-lbl">Confidence</span>
      </div>

      <div class="prob-row">
        ${[0,1,2].map(i => `
          <div class="prob-col${i === bestIdx ? ' best' : ''}">
            <div class="p-lbl">${probLabels[i]}</div>
            <div class="p-val">${probVals[i]}</div>
          </div>
        `).join('')}
      </div>
    `;
    return card;
  }

  function escHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // ── Event listeners ────────────────────────────────────────────────────────
  document.getElementById('conf-slider').addEventListener('input', e => {
    minConf = +e.target.value;
    document.getElementById('conf-label').textContent = minConf + '%';
    render();
  });

  document.getElementById('search').addEventListener('input', e => {
    searchQuery = e.target.value.trim();
    render();
  });

  loadData();
</script>
</body>
</html>
